<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    FMP RADIO - OFFICIAL SVG LOGO (OPTIMIZED)
    =========================================
    Architectural Marker: Scalable Vector Graphics
    Purpose: Bandwidth Optimization & High-Density Display
    BREADCRUMB: Version 1.0 - Elite Core Branding
  -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Chassis -->
  <rect x="20" y="20" width="472" height="472" rx="40" fill="#0A0E1A" stroke="#1E293B" stroke-width="4"/>
  
  <!-- FMP Letters -->
  <g filter="url(#glow)">
    <!-- F -->
    <path d="M120 160V320M120 160H200M120 240H180" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- M -->
    <path d="M240 320V160L280 240L320 160V320" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- P -->
    <path d="M360 320V160H410C440 160 460 180 460 210C460 240 440 260 410 260H360" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- RADIO Subtext -->
  <text x="290" y="420" text-anchor="middle" fill="#EF4444" style="font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 64px; letter-spacing: 0.3em; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">RADIO</text>

  <!-- Broadcast Waves -->
  <g stroke="#EF4444" stroke-width="8" stroke-linecap="round" opacity="0.4">
    <path d="M180 100C220 80 360 80 400 100">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M140 80C200 50 380 50 440 80">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.5s" />
    </path>
  </g>
</svg>
